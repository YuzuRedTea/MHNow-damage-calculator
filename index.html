<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MHN Damage Calculator</title>
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1a1a1e;
            --accent-color: #ff9800;
            --text-main: #ffffff;
            --text-muted: #a0a0aa;
            --input-bg: #27272a;
            --border-color: #3f3f46;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .calculator-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 4px;
            color: var(--accent-color);
            text-align: center;
        }

        .subtitle {
            font-size: 0.875rem;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 24px;
        }

        .input-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-main);
        }

        input, select {
            width: 100%;
            padding: 12px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus, select:focus {
            border-color: var(--accent-color);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 20px 0;
            cursor: pointer;
        }

        .checkbox-group input {
            width: auto;
            cursor: pointer;
        }

        .result-box {
            background: linear-gradient(135deg, #2b1c0c, #1a1a1e);
            border: 1px dashed var(--accent-color);
            border-radius: 8px;
            padding: 16px;
            text-align: center;
            margin-top: 24px;
        }

        .result-label {
            font-size: 0.875rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .result-value {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--accent-color);
            margin: 4px 0;
        }

        .math-breakdown {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 8px;
            line-height: 1.4;
        }
    </style>
</head>
<body>

<div class="calculator-card">
    <h1>MHN Damage Calculator</h1>
    <p class="subtitle">Basic Math & Rounding Engine</p>

    <!-- Raw Attack Input -->
    <div class="input-group">
        <label for="rawAtk">Weapon Raw Attack</label>
        <input type="number" id="rawAtk" value="800" min="0" oninput="calculateDamage()">
    </div>

    <!-- Element Input -->
    <div class="input-group">
        <label for="elementAtk">Weapon Element Attack</label>
        <input type="number" id="elementAtk" value="400" min="0" oninput="calculateDamage()">
    </div>

    <!-- Monster Weakness Toggle -->
    <div class="input-group">
        <label for="elementWeakness">Monster Elemental Weakness</label>
        <select id="elementWeakness" onchange="calculateDamage()">
            <option value="1">Weak to Element (100% Value)</option>
            <option value="0">NOT Weak to Element (0% Value)</option>
        </select>
    </div>

    <!-- Motion Value Input -->
    <div class="input-group">
        <label for="motionValue">Motion Value (MV %)</label>
        <input type="number" id="motionValue" value="30" min="0" max="500" oninput="calculateDamage()">
    </div>

    <!-- Hitzone Value Input -->
    <div class="input-group">
        <label for="hitzoneValue">Hitzone Value (HZV %)</label>
        <input type="number" id="hitzoneValue" value="130" min="0" max="300" oninput="calculateDamage()">
    </div>

    <!-- Critical Hit Toggle -->
    <label class="checkbox-group">
        <input type="checkbox" id="isCrit" onchange="calculateDamage()">
        <span>Is it a Critical Hit? (1.25x Modifier)</span>
    </label>

    <!-- Output Box -->
    <div class="result-box">
        <div class="result-label">Estimated Damage per Hit</div>
        <div class="result-value" id="finalDamage">0</div>
        <div class="math-breakdown" id="breakdownText">Loading formula...</div>
    </div>
</div>

<script>
function calculateDamage() {
    // 1. Gather values from the input fields
    const rawAtk = Math.max(0, parseFloat(document.getElementById('rawAtk').value) || 0);
    const elementAtk = Math.max(0, parseFloat(document.getElementById('elementAtk').value) || 0);
    const elementWeakness = parseFloat(document.getElementById('elementWeakness').value);
    
    // Percentages are divided by 100 to convert to decimal multipliers (e.g. 30% -> 0.30)
    const mv = (parseFloat(document.getElementById('motionValue').value) || 0) / 100;
    const hzv = (parseFloat(document.getElementById('hitzoneValue').value) || 0) / 100;
    
    const isCrit = document.getElementById('isCrit').checked;
    const critMultiplier = isCrit ? 1.25 : 1.0;

    // 2. MHN Specific Rounding Logic
    // Step A & B: Process total Attack and Element bases (using Floor functions for modifiers if present)
    const totalRaw = Math.floor(rawAtk);
    const totalElement = elementWeakness === 1 ? Math.floor(elementAtk) : 0;
    
    // Step C: Calculate damage before Final Ceiling Rounding
    // Formula: (Raw + Element) * Crit * MV * HZV
    const baseDamageSum = totalRaw + totalElement;
    const rawCalculatedDamage = baseDamageSum * critMultiplier * mv * hzv;
    
    // MHN applies a Ceiling function to finalize the damage tick
    const finalDamage = Math.ceil(rawCalculatedDamage);

    // 3. Render the output to the UI
    document.getElementById('finalDamage').innerText = finalDamage;
    
    // 4. Update the technical breakdown text for reference
    document.getElementById('breakdownText').innerHTML = 
        `Base: (${totalRaw} Raw + ${totalElement} Ele) = ${baseDamageSum}<br>` +
        `Math: ⌈${baseDamageSum} × ${critMultiplier}x Crit × ${mv} MV × ${hzv} HZV⌉ = ${finalDamage}`;
}

// Run calculation automatically on page load
calculateDamage();
</script>

</body>
</html>
