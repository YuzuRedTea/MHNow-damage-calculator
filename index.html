<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MHNow Dmg Calc by YuzuRedTea</title>
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1a1a1e;
            --accent-color: #ff9800;
            --text-main: #ffffff;
            --text-muted: #a0a0aa;
            --input-bg: #27272a;
            --border-color: #3f3f46;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .calculator-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 4px;
            color: var(--accent-color);
            text-align: center;
        }

        .subtitle {
            font-size: 0.875rem;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 12px;
        }

        .input-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-main);
        }

        input, select {
            width: 100%;
            padding: 12px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus, select:focus {
            border-color: var(--accent-color);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 20px 0;
            cursor: pointer;
        }

        .checkbox-group input {
            width: auto;
            cursor: pointer;
        }

        .result-box {
            background: linear-gradient(135deg, #2b1c0c, #1a1a1e);
            border: 1px dashed var(--accent-color);
            border-radius: 8px;
            padding: 16px;
            text-align: center;
            margin-top: 24px;
        }

        .result-label {
            font-size: 0.875rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .result-value {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--accent-color);
            margin: 4px 0;
        }

        .math-breakdown {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 8px;
            line-height: 1.4;
        }
		
		.input-group-box {
			border: 1px solid var(--border-color);
			border-radius: 8px;
			padding: 16px;
			margin-bottom: 20px;
			background-color: rgba(255, 255, 255, 0.02); /* Slight tint for contrast */
		}

		.input-group-box legend {
			font-size: 0.85rem;
			font-weight: 700;
			text-transform: uppercase;
			letter-spacing: 0.05em;
			color: var(--accent-color);
			padding: 0 8px; /* Prevents the border from touching the text */
		}
    </style>
</head>
<body>

<div class="calculator-card">
    <h1>MHN Damage Calculator v0.2.2</h1>
	<p class="subtitle">
        <a href="https://linktr.ee/porridgehouseprints" target="_blank" style="color: white; text-decoration: none;">
            By YuzuRedTea
        </a>
		<br>
    </p>
    <p class="subtitle">Only calculates highest damage possible</p>
    <p class="subtitle">NOT accounting for Crit, CritFero, hitzone value, motion value</p>

	<fieldset class="input-group-box">
		<legend>Weapon Base Stats</legend>
		
		<div class="input-group">
			<label for="weaponRawAtk">Raw Attack</label>
			<input type="number" id="weaponRawAtk" value="1000" min="0" oninput="calculateDamage()">
		</div>

		<div class="input-group">
			<label for="weaponEleAtk">Element Attack</label>
			<input type="number" id="weaponEleAtk" value="1000" min="0" oninput="calculateDamage()">
		</div>
		
		<div class="input-group">
			<label for="weaponCrit">Crit Chance (%)</label>
			<input type="number" id="weaponCrit" value="0" min="-100" max = "100" oninput="calculateDamage()">
		</div>
	</fieldset>

	<fieldset class="input-group-box">
		<legend>Monster Stats</legend>
		<!-- Monster Weakness Toggle -->
		<div class="input-group">
			<label for="eleWeakness">Monster Element Weakness</label>
			<select id="eleWeakness" onchange="calculateDamage()">
				<option value="1.0">Weak to Element (100% Value)</option>
				<option value="1.5">Super Weak to Element (150% Value)</option>
				<option value="0">NOT Weak to Element (0% Value)</option>
			</select>
		</div>
	</fieldset>

	<fieldset class="input-group-box">
		<legend>Added Bonus</legend>
		<!-- Added Flat Raw Input -->
		<div class="input-group">
			<label for="addFlatRaw">Added Flat Raw (e.g. Attack Boost)</label>
			<input type="number" id="addFlatRaw" value="0" min="0" oninput="calculateDamage()">
		</div>

		<!-- Raw % increase Input -->
		<div class="input-group">
			<label for="addRawPercent">Added Raw % (e.g. Burst)</label>
			<input type="number" id="addRawPercent" value="0" min="0" oninput="calculateDamage()">
		</div>

		<!-- Added Flat Ele Input -->
		<div class="input-group">
			<label for="addFlatEle">Added Flat Ele (e.g. Fire Attack)</label>
			<input type="number" id="addFlatEle" value="0" min="0" oninput="calculateDamage()">
		</div>

		<!-- Ele % increase Input -->
		<div class="input-group">
			<label for="addElePercent">Added Ele % (e.g. Ele Release)</label>
			<input type="number" id="addElePercent" value="0" min="0" oninput="calculateDamage()">
		</div>

		<!-- Ele % increase Input -->
		<div class="input-group">
			<label for="addDamagePercent">Added Damage % (e.g. Fighting Spirit)</label>
			<input type="number" id="addDamagePercent" value="0" min="0" oninput="calculateDamage()">
		</div>
		
		<!-- Additonal Crit Chance % Input -->
		<div class="input-group">
			<label for="addCritChance">Additional Crit Chance % (e.g. Crit Eye)</label>
			<input type="number" id="addCritChance" value="0" min="-100" oninput="calculateDamage()">
		</div>
		
		<!-- Additonal Crit Dmg % Input -->
		<div class="input-group">
			<label for="addCritDmg">Additional Crit Damage % (e.g. Crit Boost)</label>
			<input type="number" id="addCritDmg" value="0" min="0" oninput="calculateDamage()">
		</div>
		
		<div class="input-group">
			<label for="critFero">Critical Ferocity</label>
			<select id="critFero" onchange="calculateDamage()">
				<option value="0">Critical Ferocity Level 0</option>
				<option value="1.5">Critical Ferocity Level 1</option>
				<option value="1.75">Critical Ferocity Level 2</option>
				<option value="2.0">Critical Ferocity Level 3</option>
				<option value="2.25">Critical Ferocity Level 4</option>
				<option value="2.5">Critical Ferocity Level 5</option>
			</select>
		</div>
	</fieldset>

    <!-- Output Box -->
    <div class="result-box">
        <div class="result-label">Highest Damage</div>
        <div class="result-value" id="finalDamage">3</div>
    </div>
</div>

<script>
function calculateDamage() {
    // 1. Gather values from the input fields
    const weaponRawAtk = Math.max(0, parseFloat(document.getElementById('weaponRawAtk').value) || 0);
    const weaponEleAtk = Math.max(0, parseFloat(document.getElementById('weaponEleAtk').value) || 0);
    const weaponCrit = Math.max(-100, parseFloat(document.getElementById('weaponCrit').value) || 0);
    const addFlatRaw = Math.max(0, parseFloat(document.getElementById('addFlatRaw').value) || 0);
    const addRawPercent = Math.max(0, parseFloat(document.getElementById('addRawPercent').value) || 0);
    const addFlatEle = Math.max(0, parseFloat(document.getElementById('addFlatEle').value) || 0);
    const addElePercent = Math.max(0, parseFloat(document.getElementById('addElePercent').value) || 0);
    const addDamagePercent = Math.max(0, parseFloat(document.getElementById('addDamagePercent').value) || 0);
    const eleWeakness = parseFloat(document.getElementById('eleWeakness').value);
    const addCritChance = Math.max(-100, parseFloat(document.getElementById('addCritChance').value) || 0);
    const addCritDmg = Math.max(0, parseFloat(document.getElementById('addCritDmg').value) || 0);
    const critFero = parseFloat(document.getElementById('critFero').value);

	// 2. Calculate Raw & Ele after bonus
	const totalRaw = (weaponRawAtk + addFlatRaw) * (1 + (addRawPercent / 100));
	const totalEle = (weaponEleAtk + addFlatEle) * (1 + (addElePercent / 100 * eleWeakness));
	const totalDamage = (Math.floor(totalRaw) + Math.floor(totalEle)) * (1 + (addDamagePercent / 100));

	// 3. Crit
	const finalCritChance = Math.min(1.0, ((weaponCrit + addCritChance) / 100));
	let finalCritDmg = 0
	let totalDamageWithCrit = 0

	if (finalCritChance === 0){
		//no need for calculation
		totalDamageWithCrit = totalDamage
	}
	else if (finalCritChance > 0) {
		//crit chance > 0, normal calc
		finalCritDmg = 1.25 + addCritDmg
		totalDamageWithCrit = totalDamage * finalCritDmg
		//without crit + with crit
		<!-- totalDamageWithCrit = (totalDamage * (1-finalCritChance)) + (totalDamage * (finalCritChance) * finalCritDmg) -->
	}
	else {
	console.log(2)
		//negative crit
		if (critFero === 0){
		//ignored, only care about highest possible Dmg
			totalDamageWithCrit = totalDamage	
		}
		else{
		//crit Ferocity
			totalDamageWithCrit = totalDamage * critFero
		}
	}
	
    
    // MHN applies a Ceiling function to finalize the damage tick
    const finalDamage = Math.ceil(totalDamageWithCrit);

    // 3. Render the output to the UI
    document.getElementById('finalDamage').innerText = finalDamage;
}

// Run calculation automatically on page load
calculateDamage();
</script>

</body>
</html>
